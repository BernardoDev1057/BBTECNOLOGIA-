<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP - Produtos e Estoque</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container py-3">

  <!-- MENU -->
  <div id="menu-global-container"></div>

  <!-- BOTÃO NOVO -->
  <button class="btn btn-success mb-3" id="btn-novo-produto">
    ➕ Novo Produto
  </button>

  <!-- BUSCA -->
  <input type="text" id="busca-produto" class="form-control mb-3"
         placeholder="Filtrar por código ou descrição..." />

  <!-- TABELA -->
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-bold">
      📦 Estoque / Produtos
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Código</th>
              <th>Descrição</th>
              <th>Custo</th>
              <th>Venda</th>
              <th>Margem</th>
              <th>Atacado</th>
              <th>Estoque</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabela-produtos"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ================= MODAL PRINCIPAL ================= -->
<div class="modal fade" id="modalEstoque" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modal-title-estoque"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="produto-id">
        <input type="hidden" id="mov-produto-id">

        <!-- FORM PRODUTO -->
        <div id="modal-produto-form">

          <div class="row g-3">

            <div class="col-12 col-md-8">
              <label class="form-label">Descrição</label>
              <input id="prod-descricao" class="form-control" />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Código de Barras</label>
              <input id="prod-codigo" class="form-control" />
            </div>

            <div class="col-6">
              <label class="form-label">Custo</label>
              <input id="prod-custo" type="number" step="0.01" class="form-control" />
            </div>

            <div class="col-6">
              <label class="form-label">Venda</label>
              <input id="prod-venda" type="number" step="0.01" class="form-control" />
            </div>

            <div class="col-6">
              <label class="form-label">Atacado</label>
              <input id="prod-preco-atacado" type="number" step="0.01" class="form-control" />
            </div>

            <div class="col-6">
              <label class="form-label">Qtd Mín Atacado</label>
              <input id="prod-qtd-min-atacado" type="number" class="form-control" />
            </div>

            <div class="col-6">
              <label class="form-label">Estoque Inicial</label>
              <input id="prod-estoque" type="number" class="form-control" value="0" />
            </div>

          </div>

        </div>

        <!-- MOVIMENTAÇÃO -->
        <div id="modal-movimento" style="display:none;">
          <p class="fw-bold" id="mov-produto-nome"></p>

          <label>Quantidade</label>
          <input type="number" id="mov-quantidade" min="0" class="form-control mb-2" />

          <label>Motivo / Observação (opcional)</label>
          <textarea id="mov-motivo" class="form-control" rows="2"
            placeholder="Ex: Venda balcão, ajuste de inventário, devolução..."></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btn-confirmar-modal">Salvar</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= MODAL IMPRESSÃO (FORA DO PRINCIPAL) ================= -->
<div class="modal fade" id="modalImpressao" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>🧾 Impressão de Etiqueta</h5>

      <label class="mt-2">Tamanho</label>
      <select id="tamanhoImpressao" class="form-select">
        <option value="pequeno">Pequeno (8x3cm)</option>
        <option value="medio">Médio (10x3cm)</option>
        <option value="grande">Grande (10x13cm)</option>
        <option value="grande">Tag Roupas (10x13cm)</option>
      </select>

      <div id="previewEtiqueta" class="border mt-3 p-2 text-center"></div>

      <button id="btnImprimirEtiqueta" class="btn btn-dark mt-3">
        🖨️ Imprimir
      </button>

    </div>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="./js/auth-guard.js"></script>

<script type="module">
  import { renderizarMenuGlobal } from "./js/menu.js";
  renderizarMenuGlobal("produtos");
</script>

<script type="module" src="./js/produtos.js"></script>

</body>
</html>
