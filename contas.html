<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Contas a Receber</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .busca-resultado { border: 1px solid #dee2e6; background: white; max-height: 150px; overflow-y: auto; position: absolute; width: 98%; z-index: 1000; display: none; }
        .busca-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
        .busca-item:hover { background: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-3">
        <div id="menu-global-container"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white py-3"><h2>Contas a Receber e Quitação de Débitos</h2></div>
            <div class="card-body bg-light border-bottom position-relative">
                <div class="row position-relative">
                    <div class="col-12 position-relative">
                        <label class="form-label fw-bold">Filtrar Histórico por Cliente:</label>
                        <input type="text" id="contas-busca-cliente" class="form-control form-control-lg" placeholder="Digite o nome do cliente para buscar a ficha de fiado...">
                        <input type="hidden" id="contas-cliente-id">
                        <div id="lista-busca-cliente" class="busca-resultado shadow rounded"></div>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="p-3 bg-white border-bottom fw-semibold">📋 Extrato de Títulos do Cliente</div>
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Data Lançamento</th><th>Valor</th><th>Status</th><th>Data Pagamento</th><th>Ação</th></tr>
                        </thead>
                        <tbody id="tabela-historico-contas">
                            <tr><td colspan="5" class="text-center text-muted py-4">Selecione um cliente acima para carregar o histórico de contas.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module">
        import { renderizarMenuGlobal } from './js/menu.js';
        renderizarMenuGlobal('contas');
    </script>
    <script type="module" src="./js/contas.js"></script>
</body>
</html>
