<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>pre {white-space: pre-wrap; word-wrap: break-word;}</style>
</head>
<body class="bg-light">

    <div class="container py-3">
        <div id="menu-global-container"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold py-3">📦 Todas as Vendas</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Data / Hora</th>
                                <th>Cliente</th>
                                <th>Itens</th>
                                <th class="text-end">Total</th>
                                <th>Forma Pgto</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-vendas"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalhes Venda -->
    <div class="modal fade" id="modal-detalhes-venda" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white"><h5 class="modal-title fw-bold">Detalhes da Venda</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="conteudo-modal-detalhes"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Trocar Cliente -->
    <div class="modal fade" id="modal-trocar-cliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white"><h6 class="modal-title fw-bold">Trocar Cliente da Venda</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <select id="select-clientes-venda" class="form-select"></select>
                    </div>
                    <input type="hidden" id="trocar-venda-id">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" id="btn-confirm-trocar-cliente">Confirmar Troca</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module">
        import { renderizarMenuGlobal } from './js/menu.js';
        renderizarMenuGlobal('vendas');
    </script>
    <script type="module" src="./js/vendas.js"></script>
</body>
</html>
