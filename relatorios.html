<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Relatórios Gerenciais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            nav, .navbar, .card-header, button, #menu-global-container, .filtro-bar-container { display: none !important; }
            body { background: white; padding: 0; }
            .card { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-3">
        <div id="menu-global-container"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white py-3"><h4 class="mb-0 fw-bold">Painel de Relatórios e Auditoria</h4></div>
            <div class="card-body bg-light filtro-bar-container">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-4">
                        <label class="form-label small fw-bold">Tipo de Relatório</label>
                        <select id="rep-tipo" class="form-select">
                            <optgroup label="Vendas e Produtos">
                                <option value="vendas_periodo">Vendas por Período</option>
                                <option value="vendas_hora">Vendas por Hora</option>
                                <option value="giro_estoque">Giro de Estoque Atual</option>
                            </optgroup>
                            <optgroup label="Financeiro e Caixa">
                                <option value="fechamentos">Fechamentos de Caixa</option>
                                <option value="sangrias_suprimentos">Movimentações de Caixa</option>
                                <option value="contas_receber">Contas a Receber (Fiados)</option>
                            </optgroup>
                            <optgroup label="Operacional">
                                <option value="auditoria_estoque">Auditoria de Estoque</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label small fw-bold">Data Inicial</label>
                        <input type="date" id="rep-data-inicio" class="form-control">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label small fw-bold">Data Final</label>
                        <input type="date" id="rep-data-fim" class="form-control">
                    </div>
                    <div class="col-12 col-md-2 d-grid gap-2 d-md-flex">
                        <button id="btn-gerar-relatorio" class="btn btn-primary fw-bold w-100">Gerar</button>
                    </div>
                </div>
            </div>
            
            <div class="card-body bg-white border-top">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h5 id="titulo-relatorio" class="fw-bold text-dark mb-0">Selecione os filtros acima</h5>
                    <button class="btn btn-success fw-bold px-3 btn-sm" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
                </div>
                
                <div id="area-tabela-relatorio" class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-light"><tr id="colunas-relatorio"><th>Selecione um relatório...</th></tr></thead>
                        <tbody id="corpo-relatorio"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module">
        import { renderizarMenuGlobal } from './js/menu.js';
        renderizarMenuGlobal('relatorios');
    </script>
    <script type="module" src="./js/relatorios.js"></script>
</body>
</html>
