<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Operação de Caixa e PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .busca-resultado { border: 1px solid #dee2e6; background: white; max-height: 150px; overflow-y: auto; position: absolute; width: 95%; z-index: 1000; display: none; }
        .busca-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
        .busca-item:hover { background: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-3">
        <div id="menu-global-container"></div>

        <div id="barra-auxiliar-caixa" class="mb-3 text-end" style="display:none;">
            <button class="btn btn-secondary fw-bold btn-sm me-2" id="nav-btn-sangria">💸 Sangria / Suprimento</button>
            <button class="btn btn-danger btn-sm fw-bold" id="nav-btn-fechar">🔒 Fechar Caixa</button>
        </div>

        <div id="tela-abertura" class="card shadow mx-auto my-5 text-center" style="max-width: 400px; display: none;">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-3">Abertura de Caixa</h3>
                <p class="text-muted small">Informe o saldo inicial de troco para liberar as vendas do turno.</p>
                <input type="number" id="caixa-troco-inicial" class="form-control text-center form-control-lg mb-3" placeholder="R$ 0,00" step="0.01" value="0.00">
                <button id="btn-confirmar-abertura" class="btn btn-success btn-lg w-100 fw-bold">Confirmar e Abrir PDV</button>
            </div>
        </div>

        <div id="tela-pdv" class="row g-4" style="display: none;">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold py-3">🛒 Lançamento de Itens</div>
                    <div class="card-body position-relative">
                        <div class="row g-2 mb-3">
                            <div class="col-9 col-sm-10 position-relative">
                                <label class="form-label small fw-bold">Buscar Produto (Nome ou Código)</label>
                                <input type="text" id="pdv-busca-produto" class="form-control" placeholder="Digite para buscar ou bipe...">
                                <div id="lista-busca-produto" class="busca-resultado shadow-sm rounded"></div>
                            </div>
                            <div class="col-3 col-sm-2">
                                <label class="form-label small fw-bold">Qtd</label>
                                <input type="number" id="pdv-qtd" value="1" min="1" class="form-control text-center">
                            </div>
                        </div>
                        <button id="btn-adicionar-item" class="btn btn-success w-100 fw-bold py-2 mb-3">⚡ Adicionar Item (F9)</button>
                        
                        <div class="table-responsive">
                            <table class="table table-striped align-middle mb-0" id="tabela-carrinho">
                                <thead class="table-light"><tr><th>Item</th><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th>Ação</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card bg-dark text-white shadow-sm mb-3">
                    <div class="card-body p-4 text-end">
                        <span class="small text-secondary text-uppercase d-block mb-1">Total da Venda</span>
                        <h1 class="display-5 fw-bold mb-0">R$ <span id="pdv-total-venda">0.00</span></h1>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="mb-3 position-relative">
                            <label class="form-label small fw-bold">Identificar Cliente</label>
                            <input type="text" id="pdv-busca-cliente" class="form-control" placeholder="Consumidor Não Identificado">
                            <input type="hidden" id="pdv-cliente-id-selecionado">
                            <div id="lista-busca-cliente" class="busca-resultado shadow-sm rounded"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Meio de Pagamento</label>
<select id="pdv-forma-pagamento" class="form-select form-select-lg">
    <option value="DINHEIRO">Dinheiro</option>
    <option value="PIX">PIX</option>
    <option value="DEBITO">Débito</option>
    <option value="CREDITO">Crédito</option>
    <option value="CREDITO_LOJA">Crédito Loja (Fiado)</option>
</select>
                        </div>
                        <button class="btn btn-success btn-lg w-100 fw-bold py-3 shadow" id="btn-finalizar-venda">Concluir Venda (F10)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-sangria" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title fw-bold">Movimentação de Valores</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Tipo</label><select id="modal-mov-tipo" class="form-select"><option value="Sangria">Sangria</option><option value="Suprimento">Suprimento</option></select></div>
                    <div class="mb-3"><label class="form-label">Valor (R$)</label><input type="number" id="modal-mov-valor" class="form-control" step="0.01"></div>
                    <div class="mb-3"><label class="form-label">Justificativa</label><input type="text" id="modal-mov-justificativa" class="form-control"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-success w-100 fw-bold" id="btn-salvar-mov-caixa">Lançar Movimentação</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal-fechamento" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white"><h5 class="modal-title fw-bold">Fechamento de Turno</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
                <div class="modal-body">
                    <p class="mb-3"><strong>Total Estimado em Sistema:</strong> <span class="badge bg-secondary p-2 fs-6">R$ <span id="txt-valor-esperado">0.00</span></span></p>
                    <div class="mb-3"><label class="form-label fw-bold">Valor Físico em Dinheiro Contado</label><input type="number" id="caixa-valor-contado" class="form-control form-control-lg" step="0.01" required></div>
                    <div class="mb-3"><label class="form-label text-muted">Justificativa para diferenças (Se houver)</label><input type="text" id="caixa-justificativa-dif" class="form-control"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-danger w-100 fw-bold py-2" id="btn-confirmar-fechamento">Fechar Caixa e Bloquear Turno</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
<script type="module">
    import { renderizarMenuGlobal } from './js/menu.js';
    renderizarMenuGlobal('caixa');

    // Inicializa os modais do Bootstrap apenas uma vez
    window.modalSangria = new bootstrap.Modal(document.getElementById('modal-sangria'));
    window.modalFechamento = new bootstrap.Modal(document.getElementById('modal-fechamento'));

    // Função para ser chamada pelo caixa.js para mostrar/esconder a barra
    window.toggleBarraCaixa = (mostrar) => {
        document.getElementById('barra-auxiliar-caixa').style.display = mostrar ? 'block' : 'none';
    };
</script>
<script type="module" src="./js/caixa.js"></script>
</body>
</html>
