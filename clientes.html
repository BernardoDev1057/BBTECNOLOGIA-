<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Cadastro de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-3">
        <div id="menu-global-container"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white"><h5 class="card-title mb-0 fw-bold" id="form-titulo">Cadastrar Novo Cliente</h5></div>
            <div class="card-body">
                <form id="form-cliente">
                    <input type="hidden" id="cliente-id">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Nome Completo</label>
                            <input type="text" id="cliente-nome" class="form-control" required>
                        </div>
                        <div class="col-12 col-sm-6 col-md-4">
                            <label class="form-label fw-semibold">CPF</label>
                            <input type="text" id="cliente-cpf" class="form-control" placeholder="Apenas números (Ex: 00011122233)">
                        </div>
                        <div class="col-12 col-sm-6 col-md-4">
                            <label class="form-label fw-semibold">Telefone (WhatsApp)</label>
                            <input type="text" id="cliente-telefone" class="form-control" placeholder="Ex: 84999991111" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-12 col-md-5">
                            <label class="form-label fw-semibold">Rua / Av e Número</label>
                            <input type="text" id="cliente-rua" class="form-control" placeholder="Ex: Rua das Flores, 123">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label fw-semibold">Bairro</label>
                            <input type="text" id="cliente-bairro" class="form-control" placeholder="Ex: Centro">
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label fw-semibold">Cidade / UF</label>
                            <input type="text" id="cliente-cidade" class="form-control" placeholder="Ex: Natal/RN">
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Tipo de Relação</label>
                            <select id="cliente-tipo" class="form-select">
                                <option value="Cliente">Cliente</option>
                                <option value="Funcionario">Funcionário</option>
                                <option value="Fornecedor">Fornecedor</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Limite de Crédito (R$)</label>
                            <input type="number" id="cliente-limite" class="form-control" step="0.01" value="0.00">
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" id="btn-salvar" class="btn btn-primary fw-bold px-4">Salvar Ficha Cadastral</button>
                            <button type="button" id="btn-cancelar" class="btn btn-secondary fw-bold ms-2" style="display:none;">Cancelar Edição</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white fw-bold py-3">👥 Base de Clientes Cadastrados</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Telefone</th>
                                <th>Endereço</th>
                                <th>Tipo</th>
                                <th>Limite</th>
                                <th>Saldo Devedor</th>
                                <th>Ações</th>
                                <th>Cobrança</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-clientes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module">
        import { renderizarMenuGlobal } from './js/menu.js';
        renderizarMenuGlobal('clientes');
    </script>
    <script type="module" src="./js/clientes.js"></script>
</body>
</html>
