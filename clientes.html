<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - Cadastro de Clientes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f6f9; }
        nav { background: #333; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 15px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        input, select { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 15px; }
        button.btn-edit { background: #ffc107; color: black; padding: 5px 10px; width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="clientes.html" style="color: #007bff;"><b>Clientes</b></a>
        <a href="produtos.html">Produtos & Estoque</a>
        <a href="caixa.html">Operação de Caixa/PDV</a>
    </nav>

    <div class="container">
        <div class="box">
            <h3>Cadastro / Edição de Cliente</h3>
            <form id="form-cliente">
                <input type="hidden" id="cliente-id">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="text" id="telefone" placeholder="Telefone" required>
                <input type="text" id="documento" placeholder="CPF ou CNPJ (Opcional)">
                <input type="text" id="endereco" placeholder="Endereço">
                <select id="tipo">
                    <option value="Cliente">Cliente</option>
                    <option value="Funcionário">Funcionário</option>
                    <option value="Fornecedor">Fornecedor</option>
                </select>
                <input type="number" id="limiteCredito" placeholder="Limite de Crédito (R$)" step="0.01" value="0">
                <button type="submit">Salvar Cliente</button>
            </form>
        </div>

        <div class="box" style="flex: 2;">
            <h3>Clientes Cadastrados</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Tipo</th>
                        <th>Limite</th>
                        <th>Saldo Devedor</th>
                        <th>Ações</th>
                        <th>Cobrancas</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module" src="./js/clientes.js"></script>
</body>
</html>
